name: Build Wii

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          export DEVKITPRO=/opt/devkitpro
          export DEVKITPPC=/opt/devkitpro/devkitPPC
          export LIBOGC_LIB=/opt/devkitpro/libogc/lib/wii
          export LIBOGC_INC=/opt/devkitpro/libogc/include
          make
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Wii-PvP-Arena
          path: boot.dol
