name: Build Wii boot.dol

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build
        run: |
          # Ortam değişkenlerini konteynerin içine sabitle
          export DEVKITPRO=/opt/devkitpro
          export DEVKITPPC=/opt/devkitpro/devkitPPC
          export LIBOGC_INC=/opt/devkitpro/libogc/include
          export LIBOGC_LIB=/opt/devkitpro/libogc/lib/wii
          
          # HATA AYIKLAMA: Makefile gerçekten orada mı?
          ls -l Makefile
          
          # Derle
          make
          
      - name: Upload boot.dol
        uses: actions/upload-artifact@v4
        with:
          name: wii-project
          path: boot.dol
