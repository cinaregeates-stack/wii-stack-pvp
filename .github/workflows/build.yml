name: Build Wii boot.dol

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build
        run: |
          # Derleyicinin ve kütüphanelerin yerini tam olarak belirtiyoruz
          # -I : Header dosyalarının olduğu ana klasör
          /opt/devkitpro/devkitPPC/bin/powerpc-eabi-g++ -O2 -mrvl -mcpu=750 -meabi -mhard-float \
          -I/opt/devkitpro/libogc/include \
          -I/opt/devkitpro/devkitPPC/powerpc-eabi/include \
          -L/opt/devkitpro/libogc/lib/wii \
          src/main.cpp -logc -lm -o main.elf
          
          # DOL dosyasına çevir
          /opt/devkitpro/devkitPPC/bin/powerpc-eabi-objcopy -O binary main.elf boot.dol
          
      - name: Upload boot.dol
        uses: actions/upload-artifact@v4
        with:
          name: boot.dol
          path: boot.dol
