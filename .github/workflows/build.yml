name: Build Wii boot.dol

env:
  CI_TRIGGER: "2026-06-29-trigger"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitppc:latest
    steps:
      - uses: actions/checkout@v4
      - name: Show container and toolchain
        run: |
          set -eux
          echo "OS release:"
          cat /etc/os-release || true
          echo "devkitppc-gcc version:"
          devkitppc-gcc --version || true
      - name: Build
        run: |
          set -eux
          # Ensure devkitPro toolchain dirs are in PATH
          export PATH=/opt/devkitpro/devkitPPC/bin:/opt/devkitpro/tools/bin:$PATH
          echo "PATH=$PATH"
          ls -la /opt/devkitpro/devkitPPC/bin || true
          which devkitppc-g++ || true
          make -j$(nproc)
      - name: Upload boot.dol
        uses: actions/upload-artifact@v4
        with:
          name: boot.dol
          path: boot.dol
