name: Build Wii boot.dol

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build
        run: |
          export DEVKITPRO=/opt/devkitpro
          # Sadece derlemeyi değil, kütüphane yollarını da ekrana yazdırıyoruz
          echo "Kütüphane yolu: $DEVKITPRO/libogc/include"
          
          # HATA AYIKLAMA: Derleyiciyi daha detaylı (verbose) çalıştır
          /opt/devkitpro/devkitPPC/bin/powerpc-eabi-g++ -v -O2 -mrvl -mcpu=750 -meabi -mhard-float \
          -I$DEVKITPRO/libogc/include \
          -I$DEVKITPRO/libogc/include/ogc \
          -L$DEVKITPRO/libogc/lib/wii \
          src/main.cpp -logc -lm -o main.elf
          
      - name: Upload boot.dol
        uses: actions/upload-artifact@v4
        with:
          name: boot.dol
          path: boot.dol
