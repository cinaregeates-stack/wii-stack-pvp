name: Build Wii boot.dol

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build
        run: |
          # DEVKITPRO ana değişkenini tanımla
          export DEVKITPRO=/opt/devkitpro
          # Derleyiciye ana kütüphane yolunu -I ile 'recursive' (her alt dizin) tanıt
          # $DEVKITPRO/libogc/include altına bakmasını zorunlu kılıyoruz
          /opt/devkitpro/devkitPPC/bin/powerpc-eabi-g++ -O2 -mrvl -mcpu=750 -meabi -mhard-float \
          -I$DEVKITPRO/libogc/include \
          -I$DEVKITPRO/libogc/include/ogc \
          -L$DEVKITPRO/libogc/lib/wii \
          src/main.cpp -logc -lm -o main.elf
          
          /opt/devkitpro/devkitPPC/bin/powerpc-eabi-objcopy -O binary main.elf boot.dol
          
      - name: Upload boot.dol
        uses: actions/upload-artifact@v4
        with:
          name: boot.dol
          path: boot.dol
